<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — CodeForge AI</title>
    <style>
      /* Mirrors the app's design tokens (src/app/globals.css). */
      :root {
        color-scheme: light dark;
        --background: #ffffff;
        --foreground: #171717;
        --card: #ffffff;
        --muted: #f7f7f7;
        --muted-foreground: #666666;
        --border: #ebebeb;
        --primary: #171717;
        --primary-foreground: #ffffff;
        --accent: #006bff; /* blue-700 — focus ring / brand accent */
        --radius-xl: 0.75rem;
        --logo-light: block;
        --logo-dark: none;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --background: #0a0a0a;
          --foreground: #ededed;
          --card: #18181b;
          --muted: #1d1d20;
          --muted-foreground: #a1a1a1;
          --border: rgba(255, 255, 255, 0.14);
          --primary: #ededed;
          --primary-foreground: #0a0a0a;
          --accent: #3b82f6;
          --logo-light: none;
          --logo-dark: block;
        }
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: var(--foreground);
        background:
          radial-gradient(900px 460px at 50% -20%, color-mix(in srgb, var(--accent) 8%, transparent), transparent 70%),
          var(--background);
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 27rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 2.25rem 1.75rem 1.75rem;
        text-align: center;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 32px -18px rgba(0, 0, 0, 0.25);
      }
      .logo { height: 30px; width: auto; margin: 0 auto 1.5rem; }
      .logo.light { display: var(--logo-light); }
      .logo.dark { display: var(--logo-dark); }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 60px;
        height: 60px;
        margin: 0 auto 1.25rem;
        border-radius: var(--radius-xl);
        background: var(--muted);
        border: 1px solid var(--border);
        color: var(--muted-foreground);
      }
      .badge svg { width: 28px; height: 28px; }
      h1 { font-size: 1.375rem; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 0.5rem; }
      p { max-width: 22rem; margin: 0 auto; color: var(--muted-foreground); line-height: 1.6; font-size: 0.925rem; }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin: 1.25rem auto 0;
        padding: 0.3rem 0.75rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--muted);
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--muted-foreground);
      }
      .dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: #ef4444;
        animation: pulse 1.8s infinite;
      }
      .status.online { color: #16a34a; }
      .status.online .dot { background: #16a34a; animation: none; }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.45); }
        70% { box-shadow: 0 0 0 7px rgba(239, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
      }
      button {
        margin-top: 1.5rem;
        width: 100%;
        border: 0;
        border-radius: calc(var(--radius-xl) - 0.25rem);
        background: var(--primary);
        color: var(--primary-foreground);
        font-weight: 600;
        padding: 0.72rem 1.25rem;
        font-size: 0.925rem;
        cursor: pointer;
        transition: opacity 0.15s ease, transform 0.06s ease;
      }
      button:hover { opacity: 0.9; }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: 0.6; cursor: default; }
      .hint { margin-top: 0.9rem; font-size: 0.78rem; color: var(--muted-foreground); }
      .hint a { color: var(--accent); text-decoration: none; font-weight: 600; }
      .hint a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo light" src="/logo.png" alt="CodeForge AI" />
      <img class="logo dark" src="/logo-dark.png" alt="CodeForge AI" />

      <div class="badge" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h.01" />
          <path d="M8.5 16.5a5 5 0 0 1 7 0" />
          <path d="M5 12.5a10 10 0 0 1 5-2.6" />
          <path d="M14 9.9a10 10 0 0 1 5 2.6" />
          <path d="M2 8.8a15 15 0 0 1 5.5-3.2" />
          <path d="M16.5 5.6A15 15 0 0 1 22 8.8" />
          <line x1="2" y1="2" x2="22" y2="22" />
        </svg>
      </div>

      <h1>You're offline</h1>
      <p>
        CodeForge AI needs an internet connection for this page. Pages you've
        already visited stay available — reconnect to pick up where you left off.
      </p>

      <div class="status" id="status">
        <span class="dot"></span>
        <span id="status-text">No connection</span>
      </div>

      <button id="retry" onclick="location.reload()">Try again</button>
      <p class="hint">Back online? <a href="/dashboard">Go to dashboard</a></p>
    </main>

    <script>
      var statusEl = document.getElementById("status");
      var textEl = document.getElementById("status-text");
      var retryEl = document.getElementById("retry");

      // Reflect the current state, but never auto-reload on initial load:
      // this page is only shown because a fetch already failed, and
      // navigator.onLine can still report `true` on a flaky/captive network.
      function render() {
        statusEl.classList.remove("online");
        textEl.textContent = navigator.onLine ? "Reconnecting…" : "No connection";
      }
      // Only a genuine offline→online transition triggers the reload.
      window.addEventListener("online", function () {
        statusEl.classList.add("online");
        textEl.textContent = "Back online — reloading…";
        retryEl.disabled = true;
        retryEl.textContent = "Reloading…";
        location.reload();
      });
      window.addEventListener("offline", render);
      render();
    </script>
  </body>
</html>
