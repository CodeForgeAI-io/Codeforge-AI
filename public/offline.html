<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — CodeForge AI</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        text-align: center;
        padding: 2rem;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #ffffff;
        color: #111827;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0a0a0a; color: #f5f5f5; }
      }
      img { width: 64px; height: 64px; }
      h1 { font-size: 1.5rem; font-weight: 800; margin: 0; }
      p { max-width: 28rem; color: #6b7280; margin: 0; line-height: 1.6; }
      button {
        margin-top: 0.5rem;
        border: 0;
        border-radius: 0.5rem;
        background: #f97316;
        color: #fff;
        font-weight: 600;
        padding: 0.625rem 1.25rem;
        font-size: 0.95rem;
        cursor: pointer;
      }
      button:hover { background: #ea580c; }
    </style>
  </head>
  <body>
    <img src="/icon-192.png" alt="CodeForge AI" />
    <h1>You're offline</h1>
    <p>
      CodeForge AI needs an internet connection for this page. Check your
      connection and try again.
    </p>
    <button onclick="location.reload()">Retry</button>
  </body>
</html>
